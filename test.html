<!DOCTYPE html>
    <html>
        <head>
            <style>
            body {
                font-family: Arial;
                padding: 40px;
            }
            .container {
                border: 1px solid #000;
                padding: 20px;
            }
            .title {
                text-align: center;
                font-size: 24px;
                font-weight: bold;
            }
            .qr {
                margin-top: 30px;
                text-align: center;
            }
            .content {
                display: flex;
                gap: 24px;
                align-items: flex-start;
                margin-top: 24px;
            }

            .info {
                flex: 1;
            }
            </style>
        </head>

        <body>
            <div class="container">
                <div class="title">Approved Document</div>

                <div class="content">
                    <div class="info">
                        <p><strong>User:</strong> ${Document?.id}</p>
                        <p><strong>Type:</strong> ${Document?.type}</p>
                        <p><strong>Date:</strong> ${new Date(Document.createdAt).toLocaleDateString()}</p>
                        </div>

                        <div class="qr">
                        <img src="" width="150" height="150" />
                        <p>Scan to verify</p>
                    </div>
                </div>
            </div>
        </body>
    </html>
